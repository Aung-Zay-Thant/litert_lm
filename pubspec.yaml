name: litert_lm
description: Flutter plugin for on-device LLM inference using LiteRT-LM. Run Gemma 4 and other models locally on iOS and Android.
version: 0.1.0
repository: https://github.com/user/litert_lm

environment:
  sdk: ^3.11.4
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.litert.lm
        pluginClass: LiteRtLmPlugin
      ios:
        pluginClass: LiteRtLmPlugin
